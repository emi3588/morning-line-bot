<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>昨日の学習サマリー（テンプレート）</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Noto+Sans+JP:wght@400;600;700;800;900&display=swap');
    :root {
      --orange: #ff7a1a;
      --orange-deep: #ea580c;
      --orange-text: #ea580c;
      --page-bg: #fff5eb;
      --card: #ffffff;
      --font: "Nunito", "Noto Sans JP", "Hiragino Maru Gothic ProN", "Hiragino Sans", system-ui, sans-serif;
      --r-card: 20px;
      --shadow-card: 0 12px 40px rgba(234, 88, 12, 0.14);
      --ink: #1c1917;
      --ink-soft: #44403c;
    }
    * { box-sizing: border-box; }
    html { height: 100%; }
    body {
      margin: 0;
      min-height: 100%;
      font-family: var(--font);
      background: var(--page-bg);
      -webkit-font-smoothing: antialiased;
      padding: max(10px, env(safe-area-inset-top)) 10px max(14px, env(safe-area-inset-bottom));
      color: var(--ink);
    }
    .shell {
      max-width: 390px;
      margin: 0 auto;
      width: 100%;
      min-height: calc(100dvh - 24px);
      display: flex;
      flex-direction: column;
      background: var(--card);
      border-radius: var(--r-card);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(165deg, #ff8c32 0%, var(--orange-deep) 100%);
      color: #fff;
      text-align: center;
      padding: 22px 16px 20px;
    }
    .header h1 {
      margin: 0;
      font-size: 1.14rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      line-height: 1.35;
    }
    .header .sub {
      margin: 10px 0 0;
      font-size: 0.86rem;
      font-weight: 600;
      opacity: 0.98;
    }
    .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .date-line {
      padding: 12px 12px 10px;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--orange-text);
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 6px 10px;
    }
    .date-line .lbl { flex-shrink: 0; }
    .date-line .val { font-weight: 800; word-break: keep-all; }
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 5px;
      padding: 0 8px 8px;
    }
    .kpi {
      border: 1px solid rgba(251, 146, 60, 0.85);
      border-radius: 10px;
      background: #fff;
      padding: 14px 4px 12px;
      text-align: center;
      min-width: 0;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .kpi.kpi--streak {
      background: #ff6a00;
      border-color: #c94d00;
    }
    .kpi.kpi--streak .num { color: #fff; }
    .kpi.kpi--streak .unit {
      color: #fff;
      font-size: clamp(1.2rem, 7vw, 1.6rem);
      margin-top: 4px;
    }
    .kpi .num {
      display: block;
      font-size: clamp(1.42rem, 8.5vw, 1.95rem);
      font-weight: 900;
      color: var(--orange);
      line-height: 1.05;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }
    .kpi .unit {
      display: block;
      margin-top: 4px;
      font-size: clamp(0.7rem, 3.5vw, 0.9rem);
      font-weight: 800;
      color: var(--orange-text);
      line-height: 1.2;
    }
    .kpi .mark {
      display: block;
      font-size: clamp(1.4rem, 8vw, 1.9rem);
      font-weight: 900;
      line-height: 1.05;
    }
    .kpi .mark--ok { color: #22c55e; }
    .kpi .mark--ng { color: #ef4444; }
    .rule {
      height: 1px;
      margin: 0 10px 8px;
      background: linear-gradient(90deg, transparent, rgba(251,146,60,0.45), transparent);
    }
    .ai-footer {
      margin-top: auto;
      flex-shrink: 0;
      padding: 10px 10px 14px;
      background: linear-gradient(180deg, #fffbf0 0%, #fff4e0 100%);
      border-top: 1px solid rgba(251,191,36,0.35);
    }
    .ai-footer-inner {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      background: rgba(255,252,245,0.95);
      border: 1px solid rgba(253,224,171,0.9);
      border-radius: 14px;
      padding: 12px 12px 12px 10px;
      box-shadow: inset 0 1px 0 #fff;
    }
    .ai-footer .heart {
      flex-shrink: 0;
      font-size: 1.15rem;
      line-height: 1;
      margin-top: 1px;
    }
    .ai-footer .msg {
      margin: 0;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--ink-soft);
      line-height: 1.55;
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="header">
      <h1>昨日の学習サマリー ✨</h1>
      <p class="sub">キラキラ学習日記 ✨</p>
    </header>
    <div class="card-body">
      <div class="date-line">
        <span class="lbl">記録の日付</span>
        <span class="val">{{DATE}}</span>
      </div>
      <div class="kpi-grid">
        <div class="kpi kpi--streak">
          <span class="num">{{STREAK}}</span>
          <span class="unit">連続🔥</span>
        </div>
        <div class="kpi">
          <span class="num">{{COURSES}}</span>
          <span class="unit">コース</span>
        </div>
        <div class="kpi">
          <span class="num">{{LESSONS}}</span>
          <span class="unit">レッスン</span>
        </div>
        <div class="kpi">
          <span class="num">{{WEEKLY}}</span>
          <span class="unit">週間</span>
        </div>
        <div class="kpi">
          <span class="num">{{MONTHLY}}</span>
          <span class="unit">月間</span>
        </div>
        <div class="kpi">
          <span class="num">{{TOTAL}}</span>
          <span class="unit">累計</span>
        </div>
        <div class="kpi">
          <span class="num">{{NEW_LESSONS}}</span>
          <span class="unit">新規</span>
        </div>
        <div class="kpi">
          <span class="num">{{REVIEW_LESSONS}}</span>
          <span class="unit">復習</span>
        </div>
        <div class="kpi">
          <span class="num">{{REVIEW_TEXT}}</span>
          <span class="unit">復習項目</span>
        </div>
        <div class="kpi">
          <span class="mark {{GIT_CLASS}}">{{GIT}}</span>
          <span class="unit">Git</span>
        </div>
        <div class="kpi">
          <span class="mark {{WEB_CLASS}}">{{WEB}}</span>
          <span class="unit">Web</span>
        </div>
        <div class="kpi">
          <span class="mark {{UI_CLASS}}">{{UI}</span>
          <span class="unit">UI</span>
        </div>
      </div>
      <div class="rule" aria-hidden="true"></div>
    </div>
    <footer class="ai-footer">
      <div class="ai-footer-inner">
        <span class="heart" aria-hidden="true">❤️</span>
        <p class="msg">{{AI_MESSAGE}}</p>
      </div>
    </footer>
  </div>
</body>
</html>
