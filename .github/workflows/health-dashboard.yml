# 健康チェック: 毎日 21:00（日本時間）= UTC 12:00
# 4パーツ: トリガー(GHA) → ソース(Sheets) → 処理(Node+Playwright) → 届け先(LINE)

name: Health dashboard to LINE

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

concurrency:
  group: health-dashboard-line
  cancel-in-progress: true

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: health-dashboard-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: health-dashboard-ci/package-lock.json

      - name: Install npm packages
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run pipeline (Sheets → HTML → PNG → Imgur → LINE)
        env:
          TIMEZONE: Asia/Tokyo
          DAYS_OFFSET: "0"
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO_ID: ${{ secrets.LINE_TO_ID }}
          IMGUR_CLIENT_ID: ${{ secrets.IMGUR_CLIENT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: npm run run
