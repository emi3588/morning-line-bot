# 健康チェック: 毎日 21:00（日本時間）= UTC 12:00
# Sheets → HTML/PNG → GitHub Pages（dashboard.png + 図解HTML）→ LINE image（HTTPS URL）
#
# 初回: リポジトリ Settings → Pages → Build and deployment → Source を
#       「GitHub Actions」にすること。
name: Health dashboard to LINE
on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: health-dashboard
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: health-dashboard-ci/package-lock.json
      - name: Install npm packages
        working-directory: health-dashboard-ci
        run: npm ci
      - name: Install Playwright Chromium
        working-directory: health-dashboard-ci
        run: npx playwright install chromium --with-deps
      - name: Run pipeline (Sheets → HTML → PNG、LINE は後段)
        working-directory: health-dashboard-ci
        env:
          SKIP_LINE_PUSH: "1"
          TIMEZONE: Asia/Tokyo
          DAYS_OFFSET: "1"
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: npm run run
      - name: Verify diagram HTML is in repo（未コミットだと Pages で 404）
        run: |
          test -f output/health-evening-line-flow.html || { echo "::error::output/health-evening-line-flow.html がありません。git add / commit / push してください。"; exit 1; }
          test -f output/health-pages-index.html || { echo "::error::output/health-pages-index.html がありません。git add / commit / push してください。"; exit 1; }
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Prepare GitHub Pages（PNG + 図解 HTML）
        run: |
          mkdir -p gh-pages-root
          cp health-dashboard-ci/dist/dashboard.png gh-pages-root/dashboard.png
          cp output/health-check-mockup-6.html gh-pages-root/health-check-mockup-6.html
          cp output/health-evening-line-flow.html gh-pages-root/health-evening-line-flow.html
          cp output/health-pages-index.html gh-pages-root/index.html
          ls -la gh-pages-root
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages-root
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
  line-push:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: health-dashboard-ci/package-lock.json
      - name: Install npm packages
        working-directory: health-dashboard-ci
        run: npm ci
      - name: Push LINE image message
        working-directory: health-dashboard-ci
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO_ID: ${{ secrets.LINE_TO_ID }}
          LINE_DASHBOARD_IMAGE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/dashboard.png?v=${{ github.run_id }}&attempt=${{ github.run_attempt }}
        run: npm run push:line-image
