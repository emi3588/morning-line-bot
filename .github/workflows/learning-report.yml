# 学習レポート: 毎朝 7:00（日本時間）= UTC 22:00（前日）
# Sheets → OpenAI → HTML/PNG → GitHub Pages → LINE image（HTTPS URL）
#
# 初回: リポジトリ Settings → Pages → Source を「GitHub Actions」にすること。
# Secrets: GOOGLE_CREDENTIALS_JSON, SHEET_ID, OPENAI_API_KEY,
#          LINE_CHANNEL_ACCESS_TOKEN, LINE_TO_ID

name: Learning Report to LINE
on:
  schedule:
    # 07:00 JST = 22:00 UTC（GitHub cron は UTC 基準）
    - cron: "0 22 * * *"
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install npm packages
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
      - name: Write GCP service account key
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          printf '%s' "$GOOGLE_CREDENTIALS_JSON" > "${{ runner.temp }}/gcp-sa.json"
      - name: Generate PNG（スプレッドシート → OpenAI → PNG、LINE は後段）
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-sa.json
          SHEET_ID: ${{ secrets.SHEET_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SKIP_LINE_PUSH: "1"
        run: node scripts/send-line-report.mjs
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Prepare GitHub Pages
        run: |
          mkdir -p gh-pages-root
          cp output/learning-report.png gh-pages-root/learning-report.png
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages-root
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
  line-push:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install npm packages
        run: npm ci
      - name: Push LINE image message
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO_ID: ${{ secrets.LINE_TO_ID }}
          LINE_LEARNING_IMAGE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/learning-report.png?v=${{ github.run_id }}&attempt=${{ github.run_attempt }}
        run: npm run learning:push-line
