name: Learning Report to LINE
on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install npm packages
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
      # --dry-run は LINE のみスキップ。シート／GCP／OpenAI を触らないよう --from-json で固定サンプルを使う。
      - name: Generate PNG
        run: node scripts/send-line-report.mjs --dry-run --from-json output/learning-summary-preview.sample.json
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Prepare GitHub Pages
        run: |
          mkdir -p gh-pages-root
          cp output/learning-report.png gh-pages-root/learning-report.png
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages-root
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
  line-push:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install npm packages
        run: npm ci
      - name: Push LINE image message
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO_ID: ${{ secrets.LINE_TO_ID }}
          LINE_LEARNING_IMAGE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/learning-report.png?v=${{ github.run_id }}&attempt=${{ github.run_attempt }}
        run: npm run learning:push-line
