<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>健康チェックダッシュボード</title>
  <style>
    @page { size: A4; margin: 10mm; background-color: #eff6ff; }
    * { box-sizing: border-box; }
    body {
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      color: #0f172a;
      margin: 0;
      padding: 0;
      background: linear-gradient(180deg, #f0f9ff 0%, #fff1f2 100%);
    }
    .container { width: 100%; max-width: 520px; margin: 0 auto; padding: 0 4px 24px; }
    .page-header {
      text-align: center;
      padding: 22px 16px 18px;
      margin-bottom: 18px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 6px 20px rgba(14, 116, 144, 0.12), 0 2px 6px rgba(15, 23, 42, 0.06);
    }
    .page-header .kicker { margin: 0; font-size: 9pt; font-weight: 700; letter-spacing: 0.12em; color: #64748b; }
    .page-header h1 { margin: 8px 0 0; font-size: 20pt; font-weight: 800; color: #0ea5e9; letter-spacing: -0.02em; }
    .page-header .meta { margin: 10px 0 0; font-size: 20pt; font-weight: 800; color: #0ea5e9; }
    .lamp { border-radius: 50%; box-shadow: 0 2px 8px rgba(15, 23, 42, 0.12); }
    .lamp--green { background-color: #22c55e; }
    .lamp--yellow { background-color: #facc15; }
    .lamp--red { background-color: #ef4444; }
    .hero {
      padding: 26px 24px 20px;
      margin-bottom: 20px;
      text-align: center;
      background: #ffffff;
      border-radius: 22px;
      border: 3px solid #fda4af;
      box-shadow: 0 8px 26px rgba(244, 63, 94, 0.12), 0 2px 8px rgba(15, 23, 42, 0.06);
    }
    .hero-title { margin: 0; font-size: 20pt; font-weight: 800; color: #0ea5e9; }
    .hero .lamp-hero { width: 124px; height: 124px; margin: 22px auto 16px; }
    .hero-note { margin: 10px 0 0; font-size: 9pt; font-weight: 700; color: #64748b; }
    .grid-label { margin: 0 0 10px 4px; font-size: 9.5pt; font-weight: 800; color: #475569; }
    .grid-9 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 6px;
    }
    .item-card {
      padding: 18px 8px 16px;
      text-align: center;
      background: #ffffff;
      border-radius: 22px;
      border: none;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.1), 0 2px 4px rgba(15, 23, 42, 0.05);
    }
    .item-card .item-name { margin: 0 0 8px; font-size: 16pt; font-weight: 800; color: #475569; letter-spacing: 0.02em; }
    .item-card .lamp-sm { width: 65px; height: 65px; margin: 0 auto 10px; }
    .item-card .value { margin: 0; font-size: 24pt; font-weight: 900; line-height: 1.15; color: #0f172a; word-break: break-all; }
    .item-card .value.time { font-size: 20pt; }
    .item-card .value.emoji { font-size: 32pt; line-height: 1.1; }
    .item-card .unit { margin: 4px 0 0; font-size: 9pt; font-weight: 700; color: #64748b; }
    .item-card .score-only { margin: 16px 0; font-size: 36pt; font-weight: 900; color: #0f172a; line-height: 1; }
  </style>
</head>
<body>
  <div class="container">
    <header class="page-header">
      <p class="kicker">HEALTH CHECK</p>
      <h1>健康見える化</h1>
      <p class="meta">__META_LINE__</p>
    </header>

    <section class="hero" aria-labelledby="hero-h">
      <h2 id="hero-h" class="hero-title">💊 健康度（全体）</h2>
      <div class="lamp __HERO_LAMP_CLASSES__ lamp-hero" role="img" aria-label="全体の状態"></div>
      <p class="hero-note">※1項目でも赤があると全体は赤</p>
    </section>

    <p class="grid-label">9項目の内訳</p>
    <div class="grid-9">
__GRID_CARDS__
    </div>

  </div>
</body>
</html>
